
repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.4
    hooks:
      - id: codespell
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v0.991
    hooks:
      - id: mypy
        name: mypy src
        files: src/.*
        additional_dependencies:
          - types-python-dateutil
          - types-pytz
          - types-requests
          - types-setuptools
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest src/tests
        language: system
        pass_filenames: false
        exclude: ".*.md"

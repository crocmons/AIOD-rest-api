services:
  app:
    stdin_open: true
    volumes:
      - ./src:/app:ro
      - ${DATA_PATH}/taxonomies:/data/taxonomies
    command: python main.py

  fill-db-with-examples:
    volumes:
      - ./src:/app:ro
      - ./connectors:/opt/connectors/script:ro

  deletion:
    volumes:
      - ./src:/app:ro

  huggingface-dataset-connector:
    volumes:
      - ./src:/app:ro
      - ./connectors/huggingface/:/opt/connectors/script:ro

  keycloak:
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./authentication/import:/opt/keycloak/data/import
    command: >
      start
      --hostname-url http://${HOSTNAME}/aiod-auth
      --hostname-admin-url http://${HOSTNAME}/aiod-auth
      --http-relative-path=/aiod-auth
      --http-enabled=true
      --hostname-strict-https=false
      --import-realm

  openml-connector:
    volumes:
      - ./src:/app:ro
      - ./connectors/openml/:/opt/connectors/script:ro
    command: >
      /bin/bash -c "mkdir -p /opt/connectors/data/openml/dataset && /opt/connectors/script/datasets.sh"
      # /bin/bash -c "mkdir -p /opt/connectors/data/openml/dataset && /opt/connectors/script/datasets.sh"

  zenodo-dataset-connector:
    volumes:
      - ./src:/app:ro
      - ./connectors/zenodo/:/opt/connectors/script:ro
    command: >
      /bin/bash -c "mkdir -p /opt/connectors/data/zenodo/dataset && /opt/connectors/script/datasets.sh"

  es_logstash_setup:
    volumes:
      - ./src:/app:ro

  taxonomy:
    stdin_open: true
    volumes:
       - ./src:/app:ro

  prometheus:
    volumes:
      - ${PROMETHEUS_DATA_PATH:-./data/prometheus}:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}

  grafana:
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL:-http://prometheus:9090}
      - GRAFANA_MYSQL_HOST=${GRAFANA_MYSQL_HOST:-sqlserver}
      - GRAFANA_MYSQL_PORT=${GRAFANA_MYSQL_PORT:-3306}
      - GRAFANA_MYSQL_DB=${GRAFANA_MYSQL_DB:-aiod}
      - GRAFANA_MYSQL_USER=${GRAFANA_MYSQL_USER:-root}
      - GRAFANA_MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ${GRAFANA_DATA_PATH:-./data/grafana}:/var/lib/grafana
